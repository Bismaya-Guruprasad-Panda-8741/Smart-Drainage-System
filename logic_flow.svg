<svg width="700" height="600" viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a;border-radius:12px;font-family:monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#e0e0ff" font-size="15" font-weight="bold">System Logic Flow</text>

  <!-- START -->
  <rect x="275" y="50" width="150" height="40" rx="20" fill="#1a3a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="350" y="75" text-anchor="middle" fill="#81c784" font-size="12">SYSTEM START</text>
  <line x1="350" y1="90" x2="350" y2="115" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- READ SENSORS -->
  <rect x="245" y="115" width="210" height="40" rx="6" fill="#0d2a4a" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="350" y="140" text-anchor="middle" fill="#64b5f6" font-size="11">Read Rain Sensor (D2)</text>
  <line x1="350" y1="155" x2="350" y2="175" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MEASURE DISTANCE -->
  <rect x="230" y="175" width="240" height="40" rx="6" fill="#0d2a4a" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="350" y="200" text-anchor="middle" fill="#64b5f6" font-size="11">Measure Distance (D9/D10)</text>
  <line x1="350" y1="215" x2="350" y2="240" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DECISION 1: dist <= 9? -->
  <polygon points="350,240 470,280 350,320 230,280" fill="#1a1a3a" stroke="#ffee58" stroke-width="1.5"/>
  <text x="350" y="276" text-anchor="middle" fill="#ffee58" font-size="10">distance ≤ 9 cm?</text>
  <text x="350" y="290" text-anchor="middle" fill="#aaa" font-size="9">(HIGH level)</text>

  <!-- YES branch → HIGH ACTION -->
  <line x1="230" y1="280" x2="100" y2="280" stroke="#ef5350" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="158" y="272" fill="#ef5350" font-size="9">YES</text>
  <rect x="20" y="255" width="80" height="50" rx="6" fill="#3a1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="60" y="276" text-anchor="middle" fill="#ef9a9a" font-size="9">HIGH</text>
  <text x="60" y="290" text-anchor="middle" fill="#ef9a9a" font-size="9">Pump ON</text>
  <text x="60" y="302" text-anchor="middle" fill="#ef9a9a" font-size="9">Buzzer ON</text>

  <!-- NO → DECISION 2: dist > 18? -->
  <line x1="350" y1="320" x2="350" y2="355" stroke="#ffee58" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="342" fill="#ffee58" font-size="9">NO</text>
  <polygon points="350,355 480,395 350,435 220,395" fill="#1a1a3a" stroke="#ffee58" stroke-width="1.5"/>
  <text x="350" y="391" fill="#ffee58" font-size="10">distance &gt; 18 cm?</text>
  <text x="350" y="405" fill="#aaa" font-size="9">(LOW level)</text>

  <!-- YES → LOW ACTION -->
  <line x1="480" y1="395" x2="590" y2="395" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="524" y="387" fill="#66bb6a" font-size="9">YES</text>
  <rect x="590" y="370" width="80" height="50" rx="6" fill="#1a3a1a" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="630" y="391" text-anchor="middle" fill="#a5d6a7" font-size="9">LOW</text>
  <text x="630" y="405" text-anchor="middle" fill="#a5d6a7" font-size="9">Pump OFF</text>
  <text x="630" y="418" text-anchor="middle" fill="#a5d6a7" font-size="9">Buzzer OFF</text>

  <!-- NO → MID -->
  <line x1="350" y1="435" x2="350" y2="460" stroke="#ffee58" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="452" fill="#ffee58" font-size="9">NO</text>
  <rect x="280" y="460" width="140" height="35" rx="6" fill="#2a2a1a" stroke="#ffa726" stroke-width="1.5"/>
  <text x="350" y="478" text-anchor="middle" fill="#ffcc80" font-size="10">MID — Maintain</text>
  <text x="350" y="490" text-anchor="middle" fill="#ffcc80" font-size="9">current state</text>

  <!-- UPDATE LCD -->
  <line x1="60" y1="305" x2="60" y2="520" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="60" y1="520" x2="280" y2="520" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="630" y1="420" x2="630" y2="520" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="630" y1="520" x2="420" y2="520" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="350" y1="495" x2="350" y2="518" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>

  <rect x="230" y="518" width="240" height="40" rx="6" fill="#1a1a3a" stroke="#9575cd" stroke-width="1.5"/>
  <text x="350" y="538" text-anchor="middle" fill="#ce93d8" font-size="11">Update LCD Display</text>
  <text x="350" y="552" text-anchor="middle" fill="#9575cd" font-size="9">Line1: RAIN:YES/NO  Line2: HIGH/MID/LOW</text>

  <!-- LOOP BACK -->
  <line x1="350" y1="558" x2="350" y2="575" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="572" fill="#555" font-size="9">delay 500ms → loop</text>
</svg>
