<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e;border-radius:12px;font-family:monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e0e0ff" font-size="16" font-weight="bold">Smart Drainage System — Wiring Diagram</text>

  <!-- ── ARDUINO UNO (center) ── -->
  <rect x="330" y="260" width="240" height="180" rx="10" fill="#1a3a1a" stroke="#4caf50" stroke-width="2"/>
  <text x="450" y="282" text-anchor="middle" fill="#81c784" font-size="13" font-weight="bold">ARDUINO UNO</text>
  <!-- Pins left side -->
  <text x="342" y="306" fill="#aaa" font-size="9">5V</text>
  <text x="342" y="322" fill="#aaa" font-size="9">GND</text>
  <text x="342" y="338" fill="#aaa" font-size="9">A4(SDA)</text>
  <text x="342" y="354" fill="#aaa" font-size="9">A5(SCL)</text>
  <text x="342" y="370" fill="#aaa" font-size="9">D2</text>
  <!-- Pins right side -->
  <text x="520" y="306" fill="#aaa" font-size="9">D7</text>
  <text x="520" y="322" fill="#aaa" font-size="9">D8</text>
  <text x="520" y="338" fill="#aaa" font-size="9">D9(TRIG)</text>
  <text x="520" y="354" fill="#aaa" font-size="9">D10(ECHO)</text>
  <text x="520" y="370" fill="#aaa" font-size="9">GND</text>
  <text x="520" y="386" fill="#aaa" font-size="9">5V</text>
  <!-- Pin dots left -->
  <circle cx="330" cy="303" r="3" fill="#4caf50"/>
  <circle cx="330" cy="319" r="3" fill="#4caf50"/>
  <circle cx="330" cy="335" r="3" fill="#4caf50"/>
  <circle cx="330" cy="351" r="3" fill="#4caf50"/>
  <circle cx="330" cy="367" r="3" fill="#4caf50"/>
  <!-- Pin dots right -->
  <circle cx="570" cy="303" r="3" fill="#4caf50"/>
  <circle cx="570" cy="319" r="3" fill="#4caf50"/>
  <circle cx="570" cy="335" r="3" fill="#4caf50"/>
  <circle cx="570" cy="351" r="3" fill="#4caf50"/>
  <circle cx="570" cy="367" r="3" fill="#4caf50"/>
  <circle cx="570" cy="383" r="3" fill="#4caf50"/>

  <!-- ── LCD I2C (top-left) ── -->
  <rect x="30" y="60" width="180" height="100" rx="8" fill="#0d2a4a" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="120" y="80" text-anchor="middle" fill="#64b5f6" font-size="11" font-weight="bold">LCD 16x2 (I2C)</text>
  <text x="44" y="97" fill="#90caf9" font-size="9">VCC → 5V</text>
  <text x="44" y="111" fill="#90caf9" font-size="9">GND → GND</text>
  <text x="44" y="125" fill="#90caf9" font-size="9">SDA → A4</text>
  <text x="44" y="139" fill="#90caf9" font-size="9">SCL → A5</text>
  <!-- LCD to Arduino wires -->
  <line x1="210" y1="95" x2="330" y2="303" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="210" y1="107" x2="330" y2="319" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="210" y1="121" x2="330" y2="335" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="210" y1="135" x2="330" y2="351" stroke="#ffee58" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- ── RAIN SENSOR (top-center) ── -->
  <rect x="310" y="60" width="160" height="100" rx="8" fill="#1a2a1a" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="390" y="80" text-anchor="middle" fill="#a5d6a7" font-size="11" font-weight="bold">Rain Sensor</text>
  <text x="320" y="97" fill="#c8e6c9" font-size="9">VCC → 5V</text>
  <text x="320" y="111" fill="#c8e6c9" font-size="9">GND → GND</text>
  <text x="320" y="125" fill="#c8e6c9" font-size="9">DO → D2</text>
  <!-- Rain to Arduino wires -->
  <line x1="360" y1="160" x2="450" y2="260" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="380" y1="160" x2="450" y2="260" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="400" y1="160" x2="330" y2="367" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- ── ULTRASONIC HC-SR04 (top-right) ── -->
  <rect x="600" y="60" width="180" height="110" rx="8" fill="#2a1a2a" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="690" y="80" text-anchor="middle" fill="#ce93d8" font-size="11" font-weight="bold">HC-SR04</text>
  <text x="614" y="97" fill="#e1bee7" font-size="9">VCC → 5V</text>
  <text x="614" y="111" fill="#e1bee7" font-size="9">GND → GND</text>
  <text x="614" y="125" fill="#e1bee7" font-size="9">TRIG → D9</text>
  <text x="614" y="139" fill="#e1bee7" font-size="9">ECHO → D10</text>
  <!-- Ultrasonic to Arduino wires -->
  <line x1="600" y1="95"  x2="570" y2="383" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="600" y1="109" x2="570" y2="367" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="600" y1="123" x2="570" y2="335" stroke="#ce93d8" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="600" y1="137" x2="570" y2="351" stroke="#80deea" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- ── RELAY MODULE (right-center) ── -->
  <rect x="660" y="270" width="180" height="120" rx="8" fill="#2a1a0a" stroke="#ffa726" stroke-width="1.5"/>
  <text x="750" y="290" text-anchor="middle" fill="#ffcc80" font-size="11" font-weight="bold">Relay Module</text>
  <text x="672" y="307" fill="#ffe0b2" font-size="9">VCC → 5V</text>
  <text x="672" y="321" fill="#ffe0b2" font-size="9">GND → GND</text>
  <text x="672" y="335" fill="#ffe0b2" font-size="9">IN → D7 (Active LOW)</text>
  <text x="672" y="349" fill="#ffe0b2" font-size="9">COM → Battery(+)</text>
  <text x="672" y="363" fill="#ffe0b2" font-size="9">NO → Pump(+)</text>
  <!-- Relay to Arduino wires -->
  <line x1="660" y1="303" x2="570" y2="303" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="660" y1="317" x2="570" y2="367" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="660" y1="331" x2="570" y2="303" stroke="#ffa726" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- ── BUZZER (bottom-right) ── -->
  <rect x="660" y="430" width="160" height="80" rx="8" fill="#2a0a0a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="740" y="450" text-anchor="middle" fill="#ef9a9a" font-size="11" font-weight="bold">Buzzer (Active)</text>
  <text x="672" y="467" fill="#ffcdd2" font-size="9">+ → D8</text>
  <text x="672" y="481" fill="#ffcdd2" font-size="9">– → GND</text>
  <!-- Buzzer to Arduino wires -->
  <line x1="660" y1="463" x2="570" y2="319" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="660" y1="477" x2="570" y2="367" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- ── PUMP + BATTERY (bottom-left) ── -->
  <rect x="30" y="430" width="260" height="130" rx="8" fill="#0a1a2a" stroke="#29b6f6" stroke-width="1.5"/>
  <text x="160" y="450" text-anchor="middle" fill="#81d4fa" font-size="11" font-weight="bold">DC Pump + 4V Battery</text>
  <text x="44" y="467" fill="#b3e5fc" font-size="9">Battery(+) → Relay COM</text>
  <text x="44" y="481" fill="#b3e5fc" font-size="9">Relay NO → Pump(+)</text>
  <text x="44" y="495" fill="#b3e5fc" font-size="9">Pump(–) → Battery(–)</text>
  <text x="44" y="514" fill="#ffcc80" font-size="9" font-weight="bold">⚠ Battery(–) → Arduino GND</text>
  <text x="44" y="528" fill="#ffcc80" font-size="9" font-weight="bold">   (Common Ground)</text>
  <!-- Pump to Relay wires -->
  <line x1="290" y1="463" x2="660" y2="349" stroke="#29b6f6" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="290" y1="477" x2="660" y2="363" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Common ground line -->
  <line x1="290" y1="495" x2="330" y2="319" stroke="#555" stroke-width="2" stroke-dasharray="6 2"/>

  <!-- Legend -->
  <rect x="30" y="580" width="840" height="55" rx="6" fill="#111122" stroke="#333355" stroke-width="1"/>
  <text x="50" y="598" fill="#aaa" font-size="10" font-weight="bold">Wire Colors:</text>
  <line x1="140" y1="595" x2="175" y2="595" stroke="#ef5350" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="180" y="598" fill="#ef5350" font-size="9">VCC / 5V</text>
  <line x1="240" y1="595" x2="275" y2="595" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4 2"/>
  <rect x="238" y="590" width="40" height="8" fill="none" stroke="#555" stroke-width="0.5"/>
  <text x="284" y="598" fill="#888" font-size="9">GND</text>
  <line x1="330" y1="595" x2="365" y2="595" stroke="#42a5f5" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="370" y="598" fill="#42a5f5" font-size="9">SDA (A4)</text>
  <line x1="430" y1="595" x2="465" y2="595" stroke="#ffee58" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="470" y="598" fill="#ffee58" font-size="9">SCL (A5)</text>
  <line x1="530" y1="595" x2="565" y2="595" stroke="#ffa726" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="570" y="598" fill="#ffa726" font-size="9">Signal / Control</text>
  <line x1="660" y1="595" x2="695" y2="595" stroke="#29b6f6" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="700" y="598" fill="#29b6f6" font-size="9">Pump / Battery</text>

  <text x="450" y="625" text-anchor="middle" fill="#555" font-size="9">Note: Dashed lines indicate logical connections. Common GND between Arduino and external battery is critical.</text>
</svg>
